<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herr Boomer</title>

    <!-- CACHE-BUSTER -->
    <meta name="version" content="v1.0.6">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2; /* HELLER Hintergrund */
            color: #000; /* SCHWARZER Text */
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
        }

        /* "präsentiert" größer */
        .subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* "Feine Beats..." kleiner */
        h2 {
            margin-top: 10px;
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 25px;
        }

        /* BUTTON-STYLING */
        .social-links {
            margin-top: 20px;
            text-align: center;
        }

        .social-links ul {
            list-style: none;
            padding: 0;
        }

        .social-links li {
            margin: 12px 0;
        }

        /* ALLE BUTTONS GRÜN + SICHTBARER TEXT */
        .social-links a {
            display: inline-block;
            width: 80%;
            max-width: 400px;
            padding: 14px 20px;
            background: #008000; /* GRÜN */
            color: #000; /* SCHWARZER TEXT → SICHTBAR */
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .social-links a:hover {
            background: #006400;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <h1>Herr Boomer</h1>

    <p class="subtitle">präsentiert</p>
