<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herr Boomer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #000;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* EXAKT so breit wie Buttons */
        .tagline {
            font-size: 1.4rem;
            font-weight: 500;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 25px auto;
            line-height: 1.2;
            white-space: nowrap;
        }

        .social-links {
            margin-top: 20px;
            text-align: center;
        }

        .social-links ul {
            list-style: none;
            padding: 0;
        }

        .social-links li {
            margin: 12px 0;
        }

        /* GRÜNE BUTTONS + WEISSE SCHRIFT */
        .social-links a {
            display: inline-block;
            width: 80%;
            max-width: 400px;
            padding: 14px 20px;
            background: #008000;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .social-links a:hover {
            background: #006400;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <h1>Herr Boomer</h1>

    <p class="subtitle">präsentiert</p>
