<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herr Boomer</title>

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CFX030LZ3Q"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CFX030LZ3Q');
</script>

<style>
  body { font-family: Arial, sans-serif; background:#f2f2f2; text-align:center; padding:20px;}
  h1{font-size:3rem; margin-bottom:5px; font-weight:700;}
  .subtitle{font-size:1.4rem;margin-bottom:20px;font-weight:500;}
  .tagline{font-size:1.6rem;font-weight:700;width:80%;max-width:400px;margin:0 auto 30px auto;white-space:nowrap;overflow:hidden;}
  .social-links ul{list-style:none;padding:0;margin:0;}
  .social-links li{margin:12px 0;}
  .social-links a{display:inline-block;width:80%;max-width:400px;padding:14px 20px;background:#008000;color:#fff;text-decoration:none;font-size:1.3rem;font-weight:bold;border-radius:8px;transition:0.2s;}
  .social-links a:hover{background:#006600;}
</style>
</head>
<body>

<h1>Herr Boomer</h1>
<div class="subtitle">präsentiert</div>
<div class="tagline">Feine Beats und <br>Sprechgesang</div>

<div class="social-links">
  <ul>
    <li><a class="track" href="https://open.spotify.com/intl-de/track/2995dk7Sm6dqFsdp8NX9Nu?si=fae622d16c1e4bbd" target="_blank">Spotify</a></li>
    <li><a class="track" href="https://www.instagram.com/herrboomer63/" target="_blank">Instagram</a></li>
    <li><a class="track" href="https://youtube.com/shorts/lqf9QGWnJ0w?si=ZVZIwy2feMKXuj7H" target="_blank">YouTube</a></li>
    <li><a class="track" href="https://music.apple.com/de/album/bitte-folgen/1866958394?i=1866958409" target="_blank">Apple Music</a></li>
    <li><a class="track" href="https://music.amazon.de/albums/B0GFB412ZM" target="_blank">Amazon Music</a></li>
    <li><a class="track" href="https://herr-boomer.myspreadshop.de/" target="_blank">Gönnt euch mal was</a></li>
  </ul>
</div>

<script>
  // Klick-Tracking für alle Links mit der Klasse "track"
  const trackLinks = document.querySelectorAll('a.track');

  trackLinks.forEach(link => {
    link.addEventListener('click', function(){
      gtag('event', 'outbound_link_click', {
        'event_category': 'engagement',
        'event_label': this.href,
        'transport_type': 'beacon'
      });
      // Link normal öffnen – beacon sorgt, dass GA4 den Klick noch zählt
    });
  });
</script>

</body>
