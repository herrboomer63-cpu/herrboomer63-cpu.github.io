<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herr Boomer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #000;
            text-align: center;
            padding: 20px;
        }

        /* Haupttitel */
        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        /* Zweite Zeile */
        .subtitle {
            font-size: 1.4rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Feine Beats und Sprechgesang – einzeilig, gleich groß wie H1 */
        .tagline {
            font-size: 3rem;
            font-weight: 700;
            width: 80%;
            max-width: 400px;   /* exakt bündig mit Buttons */
            margin: 0 auto 30px auto;
            white-space: nowrap; /* EINZEILIG */
            overflow: hidden;
            text-overflow: clip;
        }

        /* Button-Liste */
        .social-links ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .social-links li {
            margin: 12px 0;
        }

        .social-links a {
            display: inline-block;
            width: 80%;
            max-width: 400px;
            padding: 14px 20px;
            background: #008000;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .social-links a:hover {
            background: #006600;
        }
    </style>
</head>
<body>

    <h1>Herr Boomer</h1>

    <div class="subtitle">präsentiert</div>

    <div class="tagline">Feine Beats und Sprechgesang</div>
