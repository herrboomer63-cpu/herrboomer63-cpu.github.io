    <title>Herr Boomer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #000;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Tagline – einzeilig, bündig, nicht abgeschnitten */
        .tagline {
            font-size: 1.4rem;          /* groß, aber nicht zu breit */
            font-weight: 700;
            width: 80%;
            max-width: 400px;         /* exakt wie Buttons */
            margin: 0 auto 30px auto;
            white-space: nowrap;      /* EINZEILIG */
            overflow: hidden;         /* verhindert Umbruch */
        }

        .social-links ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .social-links li {

        }

        .social-links a {

            padding: 14px 20px;
            background: #008000;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .social-links a:hover {
            background: #006600;
        }
    </style>
</head>
