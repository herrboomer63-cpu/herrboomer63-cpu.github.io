<style>
.social-section {
    text-align: center;
    margin-top: 40px;
}

.social-section h2 {
    font-size: 2rem;
    margin-bottom: 20px;
}

.social-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.social-btn {
    display: inline-block;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
    transition: transform 0.2s, opacity 0.2s;
    min-width: 220px;
    text-align: center;
}

/* Hover-Effekt */
.social-btn:hover {
    transform: scale(1.07);
    opacity: 0.9;
}

/* Plattform-Farben */
.instagram { background: #E1306C; }
.youtube   { background: #FF0000; }
.facebook  { background: #1877F2; }
.spotify   { background: #1DB954; color: #000; }
.apple     { background: #555; }
.tidal     { background: #000; }
.amazon    { background: #FF9900; color: #000; }

/* Shop-Button extra */
.shop {
    background: #008000;
}
.shop:hover {
    background: #006400;
}
</style>
