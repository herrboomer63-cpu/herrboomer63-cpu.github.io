<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herr Boomer</title>

    <meta name="version" content="v1.0.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #000;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .tagline {
            font-size: 3rem;          /* gleiche Größe wie Herr Boomer */
            font-weight: 600;
            width: 80%;               /* exakt wie die Buttons */
            max-width: 400px;         /* exakt wie die Buttons */
            margin: 0 auto 25px auto; /* zentriert */
            line-height: 1.2;
            white-space: normal;
        }

        .social-links ul {
            list-style: none;
            padding: 0;
        }

        .social-links li {
            margin: 12px 0;
        }

        .social-links a {
            display: inline-block;
            width: 80%;
            max-width: 400px;
            padding: 14px 20px;
            background: #008000;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
        }

        .social-links a:hover {
            background: #006600;
        }
    </style>
</head>
<body>

    <h1>Herr Boomer</h1>

    <div class="tagline">Feine Beats und Sprechgesang</div>

    <div class="social-links">
        <ul>
            <li><a href="#">Beispiel-Link</a></li>
            <li><a href="#">Noch ein Link</a></li>
        </ul>
    </div>

</body>
</html>
